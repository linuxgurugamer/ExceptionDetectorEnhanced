ExceptionDetectorEnhanced
{
	Config
	{
		ShowFullLog = True
		HideKnowns = True
		ShowInfoMessages = False
		WordWrap = True
		FixedWidth = False
		UseWhitelist = True
		UseAlwayslist = True
		UseAltSkin = false
		ShowAtStartup = True
		// window position all set to 0 upon install, position will be automatically calculated
		// when first run and then saved
		X = 0 
		Y = 0
		Width = 0
		Height = 0
		SinglePass
		{
			MODMAN = [MODULEMANAGER]
			MODMAN2 = [ModuleManager]
			TOOLBAR = ToolbarControl:
			CONTRACTTYPE = ContractConfigurator.ContractType:
			CONTRACTCONFIGTYPE = ContractConfigurator.ContractConfigurator:
			CONTRACTGROUPTYPE = ContractConfigurator.ContractGroup:
			CONTRACTAGENTTYPE = [Agent]:
			CONTRACTORBITTYPE = ContractConfigurator.OrbitFactory:
			CONTRACTRETURNHOMETYPE = ContractConfigurator.ReturnHomeFactory:
			CONTRACTNWVSLTYPE = ContractConfigurator.NewVesselFactory:
			CONTRACTCREWTYPE = ContractConfigurator.HasCrewFactory:
			CONTRACTEXPRESSTYPE = ContractConfigurator.ExpressionRequirement:
			CONTRACTPARTTYPE = ContractConfigurator.PartValidationFactory:
			CONTRACTSTATETYPE = ContractConfigurator.ReachStateFactory:
			KOSTYPE = kOS:
			FILTEREXTTYPE = [Filter Extensions 3.2.0.3]:
			TWEAKSCALETYPE = [TweakScale]
		}
		DoublePass
		{
			PARTLOADER = PartLoader:
			TEXTURELOADER = Load(Texture):
			MODELLOADER = Load(Model):
			AUDIOLOADER = Load(Audio):
		}
		Whitelist
		{
			1 = Texture isn't eligible for DXT compression
			2 = WheelCollider requires an attached Rigidbody to function
		}
		Alwayslist
		{
			1 = This line should always be found
		}
	}
}
